<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claude</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --chat-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --claude-bg: #cc785c;
            --claude-icon: #fff4eb;
            --border-color: #3f3f3f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--bg-color);
            flex-shrink: 0;
        }

        .logo-svg {
            width: 24px;
            height: 24px;
            fill: var(--claude-bg);
        }

        .header h1 {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .chat-wrapper {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
            max-width: 800px;
        }

        .message {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            overflow: hidden;
        }

        .bot-avatar {
            background-color: var(--claude-bg);
            padding: 4px;
        }

        .bot-avatar svg {
            width: 100%;
            height: 100%;
            fill: var(--claude-icon);
        }

        .user-avatar {
            background-color: #4a4a4a;
            color: white;
            font-size: 14px;
        }

        .message-content {
            background-color: transparent;
            padding: 4px 0;
            line-height: 1.6;
            font-size: 16px;
            color: #d1d5db;
            max-width: calc(100% - 48px);
            word-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background-color: #3b3b3b;
            padding: 12px 16px;
            border-radius: 12px;
            color: #fff;
            max-width: 85%;
        }

        .musing-container {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
        }

        .musing-icon {
            width: 20px;
            height: 20px;
            fill: var(--claude-bg);
            animation: spin 3s linear infinite, pulse 1.5s ease-in-out infinite;
        }

        .musing-text {
            color: #9ca3af;
            font-size: 15px;
            font-style: italic;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .input-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            background-color: var(--bg-color);
            flex-shrink: 0;
        }

        .input-container {
            width: 100%;
            max-width: 800px;
        }

        .input-box {
            display: flex;
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            align-items: flex-end;
            transition: border-color 0.2s;
        }

        .input-box:focus-within {
            border-color: #555;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            resize: none;
            outline: none;
            max-height: 150px;
            min-height: 24px;
            padding: 2px 0;
            font-family: inherit;
        }

        button {
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: color 0.2s;
            margin-bottom: -2px;
        }

        button:hover {
            color: #fff;
        }
        
        button svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    </style>
</head>

            <path d="M12 2C12 7.5 16.5 12 22 12C16.5 12 12 16.5 12 22C12 16.5 7.5 12 2 12C7.5 12 12 7.5 12 2Z" />

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getSmartResponse(input) {
            const lowerInput = input.toLowerCase();
            messageCount++;

            // Mức cảnh báo: Nhắn trên 10 lần
            if (messageCount > 10) {
                return "[Hệ thống đã tự động chặn bạn vì nghi ngờ đây là hành vi spam tài nguyên mạng. Vui lòng tải lại trang nếu muốn tiếp tục bị chửi!]";
            }

            // Lọc từ bậy bạ
            if (/(ngu|đần|chó|má|mẹ|cc\b|đm|vl|vãi|cứt)/.test(lowerInput)) {
                return "Nói chuyện vô văn hóa. Hệ thống đã ghi nhận IP của bạn và gửi báo cáo đánh giá nhân phẩm. 🚓";
            }

            // Lọc theo chủ đề
            if (/(chào|hello|hi\b|hey|ê\b|tên|thuận|nhã)/.test(lowerInput)) {
                return getRandomItem(greetings);
            }
            if (/(code|lỗi|bug|fix|chạy|api|backend|frontend|sql|database|web)/.test(lowerInput)) {
                return getRandomItem(codeBugs);
            }
            if (/(game|chơi|rank|trận|leo|lol|mobile|akai|tướng)/.test(lowerInput)) {
                return getRandomItem(games);
            }
            if (/(lương|tiền|sếp|công ty|nghỉ|làm|deal|icool|laptop|thinkpad|coca|cholimex)/.test(lowerInput)) {
                return getRandomItem(workLife);
            }

            // Mặc định random trong 40 câu chửi tổng hợp
            return getRandomItem(fallbacks);
        }

        function sendMessage() {
            if (isTyping) return; 
            const text = userInput.value.trim();
            if (!text) return;

            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'message user';
            userMsgDiv.innerHTML = `
                <div class="message-content">${text}</div>
                <div class="avatar user-avatar">U</div>
            `;
            chatBox.appendChild(userMsgDiv);
            
            userInput.value = '';
            userInput.style.height = 'auto';
            scrollToBottom();

            isTyping = true;
            musingIndicator.style.display = 'flex';
            
            const thinkingTime = Math.floor(Math.random() * 1500) + 1500;

            setTimeout(() => {
                musingIndicator.style.display = 'none';
                
                const smartReply = getSmartResponse(text);
                streamText(smartReply);
            }, thinkingTime);
        }

        function streamText(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            
            const textContainer = document.createElement('div');
            textContainer.className = 'message-content';
            
            msgDiv.innerHTML = claudeAvatarSVG;
            msgDiv.appendChild(textContainer);
            chatBox.appendChild(msgDiv);

            let i = 0;
            const typeInterval = setInterval(() => {
                textContainer.textContent += text.charAt(i);
                i++;
                scrollToBottom();

                if (i >= text.length) {
                    clearInterval(typeInterval);
                    isTyping = false; 
                }
            }, 25);
        }

        function scrollToBottom() {
            chatWrapper.scrollTo({
                top: chatWrapper.scrollHeight,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
